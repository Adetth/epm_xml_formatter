                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        // --- Application Logic ---

        let currentModuleId = 'intro';

        function initApp() {
            renderNavigation();
            loadModule(currentModuleId);

            // Mobile menu toggles
            document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.remove('hidden');
                document.getElementById('mobile-menu').classList.add('flex');
            });
            document.getElementById('mobile-close-btn').addEventListener('click', () => {
                document.getElementById('mobile-menu').classList.add('hidden');
                document.getElementById('mobile-menu').classList.remove('flex');
            });
        }

        function renderNavigation() {
            const navMenu = document.getElementById('nav-menu');
            const mobileNavMenu = document.getElementById('mobile-nav-menu');
            navMenu.innerHTML = '';
            mobileNavMenu.innerHTML = '';

            contentData.forEach(module => {
                const isActive = module.id === currentModuleId;
                const baseClasses = "flex items-center gap-3 px-6 py-3 cursor-pointer transition-colors duration-200 border-l-4";
                const activeClasses = isActive ? "bg-slate-800 border-brand-500 text-white" : "border-transparent text-slate-400 hover:bg-slate-800 hover:text-white";
                
                const navItemHTML = `
                    <div class="${baseClasses} ${activeClasses}" onclick="loadModule('${module.id}')">
                        <i class="fa-solid ${module.icon} w-5 text-center"></i>
                        <span class="text-sm font-medium">${module.title}</span>
                    </div>
                `;
                
                navMenu.innerHTML += navItemHTML;
                mobileNavMenu.innerHTML += navItemHTML;
            });
        }

        function loadModule(id) {
            currentModuleId = id;
            const module = contentData.find(m => m.id === id);
            
            document.getElementById('module-title').innerText = module.title;
            document.getElementById('module-subtitle').innerText = module.subtitle;
            document.getElementById('content-area').innerHTML = module.content;
            
            renderNavigation();

            // Mobile specific logic
            document.getElementById('mobile-menu').classList.add('hidden');
            document.getElementById('mobile-menu').classList.remove('flex');

            // If we loaded the interactive form module, initialize the grid
            if(id === 'interactive-form') {
                renderGrid(true); // Start valid
            }
        }

        // --- Interactive Form Logic (Module 3) ---

        const mockGridData = [
            { id: 'A_Murabaha_Fin', alias: 'Murabaha Financing (Cost-Plus)', isCalculated: false, isIslamic: true },
            { id: 'A_Ijarah_MBT', alias: 'Ijarah Muntahia Bittamleek', isCalculated: false, isIslamic: true },
            { id: 'A_Sukuk_Invest', alias: 'Sukuk Investments', isCalculated: false, isIslamic: true },
            { id: 'A_Isl_ECL_FAS30', alias: 'Impairment Allowance FAS 30', isCalculated: false, isIslamic: true },
            { id: 'A_Isl_Assets', alias: 'Total Islamic Financing Assets', isCalculated: true, isIslamic: true }
        ];

        function validateIntersection() {
            const entity = document.getElementById('sim-entity').value;
            const product = document.getElementById('sim-product').value;
            const banner = document.getElementById('validation-banner');
            
            // Logic: Form rows are explicitly Islamic accounts. 
            // If Entity OR Product is Conventional, it violates the Valid Intersection ring-fence rules.
            const isValid = (entity === 'islamic' && product === 'islamic');

            if (!isValid) {
                banner.classList.remove('hidden');
                renderGrid(false); // Render locked grid
            } else {
                banner.classList.add('hidden');
                renderGrid(true); // Render editable grid
            }
        }

        function renderGrid(isValid) {
            const tbody = document.getElementById('sim-grid-body');
            if(!tbody) return;

            tbody.innerHTML = '';
            
            mockGridData.forEach(row => {
                const tr = document.createElement('tr');
                
                // Account Name : Alias Display
                const th = document.createElement('td');
                th.className = 'row-header';
                th.innerHTML = `<span class="text-slate-500">${row.id} :</span> <span class="font-semibold text-slate-800">${row.alias}</span>`;
                tr.appendChild(th);

                // Generate Data Cells (Jan, Feb, Mar, Q1)
                for(let i=1; i<=4; i++) {
                    const td = document.createElement('td');
                    if (i === 4 || row.isCalculated) {
                        // Calculated/Read-only cells
                        td.className = 'epbcs-cell-readonly font-semibold';
                        td.innerText = isValid ? (i===4 ? 'Auto-Calc' : '0.00') : '#MISSING';
                    } else {
                        // Input cells
                        if(isValid) {
                            td.innerHTML = `<input type="text" class="epbcs-cell-input" placeholder="0.00">`;
                        } else {
                            td.className = 'epbcs-cell-invalid text-red-400 text-xs italic text-center';
                            td.innerText = 'Intersection Invalid';
                        }
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        // Initialize App on load
        window.onload = initApp;

    </script>
</body>
</html>
